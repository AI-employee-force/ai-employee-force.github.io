<div class="page-container pb-16 pt-8 md:pt-12">
  <div appReveal class="mb-8">
    <app-section-heading
      eyebrow="History"
      title="Run history"
      subtitle="Every agent run — filter by status or reopen a session to continue where you left off."
    />
  </div>

  <!-- Filter tabs -->
  <div appReveal class="mb-6 flex flex-wrap gap-2" role="tablist" aria-label="Filter runs by status">
    @for (tab of filterTabs; track tab.id) {
      <button
        type="button"
        role="tab"
        [attr.aria-selected]="statusFilter() === tab.id"
        [class]="tabBtnClass(tab.id)"
        (click)="setFilter(tab.id)"
      >
        {{ tab.label }}
        <span [class]="tabCountClass(tab.id)">{{ counts()[tab.id] }}</span>
      </button>
    }
  </div>

  <!-- Runs table -->
  <div appReveal>
    <app-runs-table [runs]="filteredRuns()" [agentMap]="agentMap()" />
  </div>
</div>
