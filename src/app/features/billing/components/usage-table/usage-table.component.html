<div class="rounded-2xl border border-slate-700 bg-slate-900 p-6">
  <h3 class="mb-4 text-sm font-semibold uppercase tracking-wider text-slate-400">Agent usage this month</h3>

  @if (stats().length === 0) {
    <p class="py-6 text-center text-sm text-slate-500">No runs this period yet.</p>
  } @else {
    <div class="overflow-x-auto">
      <table class="w-full text-sm">
        <thead>
          <tr class="border-b border-slate-700 text-xs uppercase tracking-wider text-slate-500">
            <th class="pb-2 text-left font-medium">Agent</th>
            <th class="pb-2 text-right font-medium">Runs</th>
            <th class="pb-2 text-right font-medium">Credits</th>
          </tr>
        </thead>
        <tbody>
          @for (stat of stats(); track stat.agentSlug) {
            <tr class="border-t border-slate-800/60">
              <td class="py-3 text-slate-200">{{ stat.agentName }}</td>
              <td class="py-3 text-right text-slate-400">{{ stat.runsThisMonth }}</td>
              <td class="py-3 text-right font-mono text-cyan-400">{{ stat.creditsConsumed }}</td>
            </tr>
          }
        </tbody>
      </table>
    </div>
  }
</div>
