<div class="grid grid-cols-2 gap-3 sm:grid-cols-4">
  @for (tpl of templates; track tpl.id) {
    <button
      type="button"
      class="group flex flex-col items-start gap-2 rounded-2xl border border-slate-200/80 bg-white/70 p-4 text-left shadow-sm transition hover:-translate-y-0.5 hover:border-slate-300 hover:shadow-md focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-cyan-400/70 dark:border-white/[0.08] dark:bg-white/[0.04] dark:hover:border-white/[0.14] dark:hover:bg-white/[0.07]"
      (click)="useTemplate(tpl.agentSlug, tpl.prompt)"
      [attr.aria-label]="'Use template: ' + tpl.label"
    >
      <span class="text-2xl leading-none" aria-hidden="true">{{ tpl.icon }}</span>
      <span class="text-sm font-semibold text-slate-800 dark:text-slate-100">{{ tpl.label }}</span>
      <span class="text-[0.7rem] text-slate-500 dark:text-slate-400">{{ tpl.agentSlug }}</span>
    </button>
  }
</div>
