<div class="card-marketplace overflow-hidden p-0">
  @if (runs().length === 0) {
    <p class="px-5 py-8 text-center text-sm text-slate-500 dark:text-slate-400">
      No runs yet. Launch an agent to get started.
    </p>
  } @else {
    <ul class="divide-y divide-slate-100 dark:divide-white/[0.06]" role="list">
      @for (run of runs(); track run.id) {
        <li
          class="flex items-center gap-4 px-4 py-3.5 transition-colors hover:bg-slate-50/80 dark:hover:bg-white/[0.03]"
        >
          <!-- Avatar -->
          <img
            [src]="portraitSrc(run.agentSlug)"
            alt=""
            role="presentation"
            width="36"
            height="36"
            class="h-9 w-9 shrink-0 rounded-full border border-slate-200 bg-white/60 object-contain p-1 dark:border-white/10 dark:bg-white/[0.05]"
            loading="lazy"
          />

          <!-- Meta -->
          <div class="min-w-0 flex-1">
            <p class="truncate text-sm font-semibold text-slate-800 dark:text-slate-100">
              {{ run.agentName }}
            </p>
            <p class="mt-0.5 truncate text-xs text-slate-500 dark:text-slate-400">
              {{ run.promptPreview }}
            </p>
          </div>

          <!-- Status + timestamp -->
          <div class="flex shrink-0 flex-col items-end gap-1">
            <app-run-status-badge [status]="run.status" />
            <time
              [attr.datetime]="run.timestamp"
              class="text-[0.68rem] text-slate-400 dark:text-slate-500"
            >
              {{ formatTime(run.timestamp) }}
            </time>
          </div>

          <!-- Reopen -->
          <a
            [routerLink]="['/workspace', run.agentSlug]"
            class="ml-1 shrink-0 rounded-full border border-slate-200 bg-white/60 px-3 py-1.5 text-xs font-semibold text-slate-700 shadow-sm backdrop-blur-sm transition hover:border-cyan-400/50 hover:text-cyan-700 dark:border-white/10 dark:bg-white/[0.04] dark:text-slate-300 dark:hover:border-cyan-400/35 dark:hover:text-cyan-300"
            [attr.aria-label]="'Reopen run with ' + run.agentName"
          >
            Reopen
          </a>
        </li>
      }
    </ul>
  }
</div>
