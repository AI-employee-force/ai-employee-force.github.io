<div class="card-marketplace overflow-hidden p-0">
  <ul class="divide-y divide-slate-100 dark:divide-white/[0.06]" role="list">
    @for (item of enriched(); track item.slug) {
      <li
        class="flex items-center gap-3 px-4 py-3 transition-colors hover:bg-slate-50/80 dark:hover:bg-white/[0.03]"
      >
        <img
          [src]="item.portraitSrc"
          alt=""
          role="presentation"
          width="32"
          height="32"
          class="h-8 w-8 shrink-0 rounded-full border border-slate-200 bg-white/60 object-contain p-1 dark:border-white/10 dark:bg-white/[0.05]"
          loading="lazy"
        />
        <div class="min-w-0 flex-1">
          <p class="truncate text-sm font-semibold text-slate-800 dark:text-slate-100">
            {{ item.agent?.name ?? item.slug }}
          </p>
          <p class="mt-0.5 text-xs text-slate-500 dark:text-slate-400">
            {{ item.runCount }} run{{ item.runCount === 1 ? '' : 's' }}
          </p>
        </div>
        <a
          [routerLink]="['/workspace', item.slug]"
          class="shrink-0 rounded-full border border-slate-200 bg-white/60 px-3 py-1.5 text-xs font-semibold text-slate-700 shadow-sm backdrop-blur-sm transition hover:border-violet-400/50 hover:text-violet-700 dark:border-white/10 dark:bg-white/[0.04] dark:text-slate-300 dark:hover:border-violet-400/35 dark:hover:text-violet-300"
          [attr.aria-label]="'Launch workspace for ' + (item.agent?.name ?? item.slug)"
        >
          Launch
        </a>
      </li>
    }
  </ul>
</div>
