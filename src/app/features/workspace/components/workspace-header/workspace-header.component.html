<div class="border-b border-slate-200/80 bg-white/60 backdrop-blur-md dark:border-white/[0.08] dark:bg-[#0d0b18]/70">
  <!-- Accent bar (agent category color) -->
  <div
    class="h-0.5 w-full"
    [style.background]="accentColor()"
    aria-hidden="true"
  ></div>

  <div class="flex items-center gap-4 px-6 py-3">
    <!-- Agent portrait -->
    <div class="relative shrink-0">
      <div
        class="absolute -inset-0.5 rounded-full opacity-60"
        [style.background]="'radial-gradient(circle, ' + accentColor() + '40, transparent 70%)'"
        aria-hidden="true"
      ></div>
      <img
        [src]="portraitSrc()"
        [alt]="agent().name"
        width="40"
        height="40"
        class="relative h-10 w-10 rounded-full border border-slate-200/80 bg-white/60 object-contain p-1 dark:border-white/10 dark:bg-white/[0.05]"
      />
    </div>

    <!-- Agent identity -->
    <div class="min-w-0 flex-1">
      <div class="flex flex-wrap items-center gap-2">
        <p class="text-sm font-bold leading-tight text-slate-900 dark:text-slate-100">
          {{ agent().name }}
        </p>
        <!-- Category badge with dynamic accent -->
        <span
          class="inline-flex items-center rounded-full border px-2 py-0.5 text-[0.58rem] font-bold uppercase tracking-[0.12em]"
          [style.borderColor]="accentColor() + '45'"
          [style.backgroundColor]="accentColor() + '18'"
          [style.color]="accentColor()"
        >
          {{ agent().categoryLabel }}
        </span>
      </div>
      <p class="text-xs text-slate-500 dark:text-slate-400">{{ agent().roleTitle }}</p>
    </div>

    <!-- Live badge -->
    <span
      class="ml-auto inline-flex shrink-0 items-center gap-1.5 rounded-full border border-cyan-400/30 bg-cyan-500/10 px-2.5 py-1 text-[0.62rem] font-bold uppercase tracking-[0.12em] text-cyan-700 dark:border-cyan-400/25 dark:bg-cyan-400/10 dark:text-cyan-300"
    >
      <span
        class="h-1.5 w-1.5 animate-pulse rounded-full bg-cyan-500 dark:bg-cyan-400"
        aria-hidden="true"
      ></span>
      Live
    </span>
  </div>
</div>
