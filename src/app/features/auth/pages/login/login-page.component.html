<div class="flex min-h-screen flex-col items-center justify-center bg-gradient-to-br from-violet-50/60 via-white to-cyan-50/40 px-4 dark:from-[#0b0a14] dark:via-[#0d0c1a] dark:to-[#0b0a14]">

  <div class="w-full max-w-sm">

    <!-- Logo / brand -->
    <a routerLink="/" class="mb-8 flex items-center justify-center gap-2 outline-none focus-visible:ring-2 focus-visible:ring-cyan-400/70 rounded-lg" aria-label="AI Employee Force — home">
      <span class="flex h-9 w-9 items-center justify-center rounded-xl bg-gradient-to-br from-cyan-400 to-violet-600 text-xs font-extrabold tracking-tight text-white shadow-sm">AEF</span>
      <span class="text-base font-bold text-slate-900 dark:text-slate-100">AI Employee Force</span>
    </a>

    <!-- Card -->
    <div class="rounded-2xl border border-slate-200/80 bg-white/90 p-8 shadow-lg backdrop-blur-sm dark:border-white/[0.08] dark:bg-white/[0.04]">
      <h1 class="mb-1 text-xl font-extrabold tracking-tight text-slate-900 dark:text-slate-100">Sign in</h1>
      <p class="mb-6 text-sm text-slate-500 dark:text-slate-400">Enter your email to access your workspace.</p>

      <div class="space-y-4">
        <div>
          <label for="login-email" class="mb-1.5 block text-xs font-semibold text-slate-700 dark:text-slate-300">
            Work email
          </label>
          <input
            id="login-email"
            type="email"
            autocomplete="email"
            placeholder="you@company.com"
            [value]="email"
            (input)="onEmailChange($any($event.target).value)"
            (keydown)="onKeydown($event)"
            class="w-full rounded-xl border border-slate-200 bg-white/80 px-4 py-2.5 text-sm text-slate-900 outline-none placeholder:text-slate-400 transition focus:border-cyan-400 focus:ring-2 focus:ring-cyan-400/30 dark:border-white/10 dark:bg-white/[0.06] dark:text-slate-100 dark:placeholder:text-slate-600 dark:focus:border-cyan-400/70"
            [attr.aria-invalid]="error() ? 'true' : null"
            aria-describedby="login-error"
          />
          @if (error()) {
            <p id="login-error" class="mt-1.5 text-xs text-red-600 dark:text-red-400" role="alert">{{ error() }}</p>
          }
        </div>

        <button
          type="button"
          class="w-full rounded-xl bg-gradient-to-r from-cyan-500 to-violet-600 px-4 py-2.5 text-sm font-bold text-white shadow-sm transition hover:opacity-90 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-cyan-400/70 disabled:cursor-not-allowed disabled:opacity-60"
          [disabled]="submitting()"
          (click)="submit()"
        >
          Continue with email
        </button>
      </div>

      <p class="mt-6 text-center text-xs text-slate-400 dark:text-slate-500">
        No password needed for early access.
        <a routerLink="/demo" class="font-semibold text-cyan-600 hover:underline underline-offset-4 dark:text-cyan-400">Request a demo</a>
        instead.
      </p>
    </div>

    <!-- Back link -->
    <p class="mt-5 text-center text-xs text-slate-400 dark:text-slate-500">
      <a routerLink="/" class="font-semibold text-slate-600 hover:underline underline-offset-4 dark:text-slate-400">
        ← Back to home
      </a>
    </p>
  </div>

</div>
