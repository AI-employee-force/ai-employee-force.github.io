<div class="rounded-2xl border border-cyan-200/70 bg-gradient-to-br from-cyan-50/80 via-white to-violet-50/60 px-6 py-5 shadow-sm dark:border-cyan-400/15 dark:from-cyan-500/[0.07] dark:via-transparent dark:to-violet-500/[0.05]">

  @if (submitted()) {
    <div class="flex items-center gap-3">
      <span class="flex h-8 w-8 shrink-0 items-center justify-center rounded-full bg-cyan-500/15 dark:bg-cyan-400/15" aria-hidden="true">
        <svg class="h-4 w-4 text-cyan-600 dark:text-cyan-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </span>
      <div>
        <p class="font-semibold text-slate-900 dark:text-slate-100">You're on the list!</p>
        <p class="text-sm text-slate-500 dark:text-slate-400">We'll reach out with early access details.</p>
      </div>
    </div>
  } @else {
    <div class="flex flex-wrap items-end gap-4">
      <div class="flex-1">
        <p class="mb-0.5 text-[0.7rem] font-bold uppercase tracking-[0.14em] text-cyan-600 dark:text-cyan-400">
          Early Access
        </p>
        <p class="text-base font-bold text-slate-900 dark:text-slate-100">
          Join the waitlist for full access
        </p>
        <p class="mt-0.5 text-sm text-slate-500 dark:text-slate-400">
          Be first to unlock unlimited runs, all agents, and chain workflows.
        </p>
      </div>

      <div class="flex w-full flex-col gap-2 sm:w-auto sm:flex-row sm:items-end">
        <div class="flex flex-col gap-1">
          <label for="waitlist-email" class="sr-only">Work email</label>
          <input
            id="waitlist-email"
            type="email"
            autocomplete="email"
            placeholder="you@company.com"
            [value]="email"
            (input)="onEmailChange($any($event.target).value)"
            (keydown)="onKeydown($event)"
            class="min-w-[220px] rounded-xl border border-slate-200 bg-white/80 px-4 py-2.5 text-sm text-slate-900 outline-none placeholder:text-slate-400 transition focus:border-cyan-400 focus:ring-2 focus:ring-cyan-400/25 dark:border-white/10 dark:bg-white/[0.06] dark:text-slate-100 dark:placeholder:text-slate-600"
            [attr.aria-invalid]="error() ? 'true' : null"
          />
          @if (error()) {
            <p class="text-xs text-red-600 dark:text-red-400" role="alert">{{ error() }}</p>
          }
        </div>
        <button
          type="button"
          class="rounded-xl bg-gradient-to-r from-cyan-500 to-violet-600 px-5 py-2.5 text-sm font-bold text-white shadow-sm transition hover:opacity-90 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-cyan-400/70 disabled:cursor-not-allowed disabled:opacity-60 whitespace-nowrap"
          [disabled]="submitting()"
          (click)="submit()"
        >
          Join waitlist
        </button>
      </div>
    </div>
  }

</div>
