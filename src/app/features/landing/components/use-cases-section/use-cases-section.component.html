<section class="mx-auto max-w-[1200px] px-5 py-14 md:py-20">
  <app-section-heading
    eyebrow="Use cases"
    title="Built for how software teams actually work"
    subtitle="From idea to test plan to deployment — specialist agents cover every handoff in your workflow."
    [align]="'center'"
  />

  <!-- Horizontal scroll on mobile, 3-col grid on desktop -->
  <div class="flex snap-x snap-mandatory gap-4 overflow-x-auto pb-2 sm:grid sm:grid-cols-2 sm:overflow-visible sm:pb-0 lg:grid-cols-3">
    @for (uc of cases; track uc.primarySlug + uc.title) {
      <div class="relative min-w-[280px] snap-start rounded-2xl border border-slate-200/80 bg-white/70 p-5 transition-shadow hover:shadow-md dark:border-white/[0.08] dark:bg-slate-900/50 sm:min-w-0"
        [style.border-left]="'3px solid var(' + uc.accentVar + ')'">

        <!-- Agent chain badges -->
        <div class="mb-3 flex flex-wrap gap-1.5">
          @for (agent of uc.agents; track agent) {
            <span class="rounded-full px-2 py-0.5 text-[0.65rem] font-bold"
              [style.background]="'color-mix(in srgb, var(' + uc.accentVar + ') 12%, transparent)'"
              [style.color]="'var(' + uc.accentVar + ')'">
              {{ agent }}
            </span>
          }
        </div>

        <h3 class="mb-2 text-sm font-bold text-slate-900 dark:text-slate-100">{{ uc.title }}</h3>
        <p class="mb-4 text-xs leading-relaxed text-slate-500 dark:text-slate-400">{{ uc.description }}</p>

        <a [routerLink]="['/workspace', uc.primarySlug]"
          class="inline-flex items-center gap-1 text-xs font-semibold transition-colors"
          [style.color]="'var(' + uc.accentVar + ')'">
          Try it →
        </a>
      </div>
    }
  </div>
</section>
