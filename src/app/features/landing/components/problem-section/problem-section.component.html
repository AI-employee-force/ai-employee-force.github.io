<section class="mx-auto max-w-[1200px] px-5 py-14 md:py-20">
  <app-section-heading
    eyebrow="The problem"
    title="Specialist work keeps falling through the gaps"
    subtitle="Your team has the ideas. Execution breaks down when expert capacity runs dry."
  />
  <div class="grid gap-5 md:grid-cols-3">
    @for (card of cards; track card.title) {
      <div class="rounded-2xl border border-slate-200/80 bg-white/60 p-6 dark:border-white/[0.08] dark:bg-slate-900/40"
        style="border-left: 3px solid #f59e0b">
        <!-- Icon -->
        <div class="mb-4 flex h-10 w-10 items-center justify-center rounded-xl bg-amber-500/10">
          @if (card.icon === 'chat') {
            <svg class="h-5 w-5 text-amber-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-3 3v-3z"/>
            </svg>
          }
          @if (card.icon === 'pile') {
            <svg class="h-5 w-5 text-amber-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414A1 1 0 0121 9.414V19a2 2 0 01-2 2z"/>
            </svg>
          }
          @if (card.icon === 'chain') {
            <svg class="h-5 w-5 text-amber-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"/>
            </svg>
          }
        </div>
        <h3 class="mb-2 text-base font-bold text-slate-900 dark:text-slate-100">{{ card.title }}</h3>
        <p class="text-sm leading-relaxed text-slate-600 dark:text-slate-400">{{ card.description }}</p>
      </div>
    }
  </div>
</section>
