<div [class]="containerClass()">
	@if (eyebrow(); as e) {
		<p [attr.id]="eyebrowId() ?? null" class="eyebrow mb-2.5">{{ e }}</p>
	}
	@if (headingLevel() === 2) {
		<h2 [attr.id]="titleId() ?? null" [class]="titleClass()">
			{{ title() }}
		</h2>
	} @else {
		<h3 [attr.id]="titleId() ?? null" [class]="titleClass()">
			{{ title() }}
		</h3>
	}
	@if (subtitle(); as s) {
		<p
			class="m-0 max-w-2xl text-[1.05rem] leading-relaxed text-slate-600 dark:text-slate-400"
			[class.mx-auto]="align() === 'center'"
		>
			{{ s }}
		</p>
	}
</div>
