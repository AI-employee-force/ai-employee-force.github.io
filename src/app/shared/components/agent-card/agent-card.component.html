<article
	class="group flex h-full min-h-full flex-col rounded-[22px] border border-slate-200/80 bg-white/70 p-6 shadow-sm backdrop-blur-md transition-all duration-300 motion-safe:hover:-translate-y-[6px] motion-safe:hover:border-violet-400/45 motion-safe:hover:shadow-[0_20px_50px_-24px_rgba(139,92,246,0.35)] dark:border-white/10 dark:bg-slate-900/55 dark:motion-safe:hover:border-fuchsia-500/35 dark:motion-safe:hover:shadow-[0_22px_56px_-20px_rgba(34,211,238,0.15)]"
>
	<div class="mb-3.5">
		<span
			class="mb-2.5 inline-block rounded-full border border-cyan-400/25 bg-cyan-500/10 px-2.5 py-1 text-[0.65rem] font-bold uppercase tracking-wider text-cyan-600 dark:text-cyan-400"
		>
			{{ agent().categoryLabel }}
		</span>
		<h3 class="mb-1 text-xl font-bold tracking-tight text-slate-900 dark:text-slate-100">{{ agent().name }}</h3>
		<p class="m-0 text-sm font-medium text-slate-500 dark:text-slate-400">{{ agent().roleTitle }}</p>
	</div>
	<p class="mb-5 flex-1 text-[0.95rem] leading-relaxed text-slate-600 dark:text-slate-400">{{ agent().shortDescription }}</p>
	<div class="mt-auto">
		<app-primary-button label="View profile" [href]="'/agents/' + agent().slug" variant="primary" />
	</div>
</article>
