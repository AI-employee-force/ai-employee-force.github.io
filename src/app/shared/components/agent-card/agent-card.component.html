<article
	class="agent-card-hover group relative flex flex-col items-center overflow-hidden rounded-3xl border border-white/35 bg-white/12 px-5 pb-6 pt-7 text-center shadow-[0_8px_40px_-12px_rgba(15,23,42,0.12),inset_0_1px_0_rgba(255,255,255,0.4)] backdrop-blur-2xl transition-[transform,border-color,box-shadow] duration-500 dark:border-white/[0.1] dark:bg-white/[0.05] dark:shadow-[0_12px_48px_-16px_rgba(0,0,0,0.45),inset_0_1px_0_rgba(255,255,255,0.05)] motion-safe:hover:-translate-y-1 motion-safe:hover:shadow-[0_20px_56px_-18px_rgba(34,211,238,0.18),inset_0_1px_0_rgba(255,255,255,0.55)] dark:motion-safe:hover:shadow-[0_24px_60px_-16px_rgba(34,211,238,0.1),inset_0_1px_0_rgba(255,255,255,0.08)]"
	[attr.aria-labelledby]="'agent-card-title-' + agent().slug"
>
	<!-- Top glass highlight -->
	<div
		class="pointer-events-none absolute inset-x-5 top-0 z-[2] h-px bg-gradient-to-r from-transparent via-white/70 to-transparent opacity-80 dark:via-white/25"
		aria-hidden="true"
	></div>
	<!-- Ambient glow behind avatar -->
	<div
		class="pointer-events-none absolute left-1/2 top-10 z-[2] h-28 w-28 -translate-x-1/2 rounded-full bg-gradient-to-br from-cyan-400/35 via-violet-500/25 to-fuchsia-500/30 blur-3xl dark:from-cyan-400/25 dark:via-violet-500/18 dark:to-fuchsia-500/22"
		aria-hidden="true"
	></div>

	<div class="relative z-10 flex w-full flex-col items-center">
		<!-- Circular portrait — transparent SVG sits on soft glass -->
		<div class="relative mb-4">
			<div
				class="absolute -inset-1 rounded-full bg-gradient-to-br from-white/40 via-white/10 to-transparent opacity-90 dark:from-white/15 dark:via-white/[0.06]"
				aria-hidden="true"
			></div>
			<div
				class="relative h-[4.5rem] w-[4.5rem] overflow-hidden rounded-full border border-white/45 bg-white/10 shadow-[0_12px_28px_-8px_rgba(15,23,42,0.15)] ring-2 ring-white/25 dark:border-white/12 dark:bg-white/[0.04] dark:shadow-[0_12px_32px_-6px_rgba(0,0,0,0.45)] dark:ring-white/[0.08] sm:h-[5rem] sm:w-[5rem]"
			>
				<img
					[src]="portraitUrl()"
					width="200"
					height="200"
					[alt]="''"
					role="presentation"
					class="h-full w-full object-contain object-center p-1.5 motion-safe:transition-transform motion-safe:duration-500 motion-safe:group-hover:scale-105 dark:brightness-[1.03] dark:contrast-[1.02]"
					decoding="async"
					loading="lazy"
				/>
			</div>
		</div>

		<span
			class="mb-2 inline-flex items-center rounded-full border border-cyan-500/15 bg-cyan-500/[0.08] px-2.5 py-0.5 text-[0.6rem] font-semibold uppercase tracking-[0.16em] text-cyan-800/90 backdrop-blur-sm dark:border-cyan-400/20 dark:bg-cyan-400/[0.1] dark:text-cyan-200/95"
		>
			{{ agent().categoryLabel }}
		</span>

		<h3
			[id]="'agent-card-title-' + agent().slug"
			class="text-lg font-semibold tracking-tight text-slate-900 dark:text-white"
		>
			{{ agent().name }}
		</h3>
		<p class="mt-0.5 text-sm font-medium text-violet-700/90 dark:text-violet-200/85">
			{{ agent().roleTitle }}
		</p>
		<p
			class="mt-3 line-clamp-3 max-w-[32ch] text-[0.8125rem] leading-relaxed text-slate-600/90 dark:text-slate-300/85"
		>
			{{ agent().shortDescription }}
		</p>

		<a
			class="relative z-10 mt-5 inline-flex items-center justify-center gap-2 rounded-full border border-white/50 bg-white/25 px-5 py-2 text-sm font-semibold text-slate-800 no-underline shadow-sm backdrop-blur-md transition-[background-color,border-color,color,transform] hover:border-white/70 hover:bg-white/40 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-cyan-400/60 focus-visible:ring-offset-2 focus-visible:ring-offset-transparent dark:border-white/15 dark:bg-white/[0.08] dark:text-slate-100 dark:hover:border-white/28 dark:hover:bg-white/[0.14] dark:focus-visible:ring-offset-[#0b0a14] motion-safe:hover:scale-[1.02]"
			[routerLink]="['/agents', agent().slug]"
		>
			View profile
			<svg
				class="h-3.5 w-3.5 shrink-0 opacity-90 transition-transform duration-300 motion-safe:group-hover:translate-x-0.5"
				viewBox="0 0 24 24"
				fill="none"
				stroke="currentColor"
				stroke-width="2.2"
				aria-hidden="true"
			>
				<path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
			</svg>
		</a>
	</div>
</article>
