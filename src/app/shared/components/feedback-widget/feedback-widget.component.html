<div class="mt-4 border-t border-slate-100 pt-4 dark:border-white/[0.06]">

  @if (submitted()) {
    <p class="text-center text-xs text-slate-400 dark:text-slate-500">
      Thanks for the feedback!
    </p>
  } @else {
    <div class="flex flex-wrap items-center gap-3">
      <p class="text-xs text-slate-500 dark:text-slate-400">Was this helpful?</p>

      <div class="flex items-center gap-2">
        <button
          type="button"
          class="flex items-center gap-1.5 rounded-lg border px-2.5 py-1.5 text-xs font-medium transition focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-cyan-400/70"
          [class]="rating() === 'up' ? 'border-emerald-300 bg-emerald-50 text-emerald-700 dark:border-emerald-400/30 dark:bg-emerald-400/10 dark:text-emerald-300' : 'border-slate-200 bg-white/60 text-slate-500 hover:border-emerald-300 hover:text-emerald-600 dark:border-white/10 dark:bg-white/[0.04] dark:text-slate-400'"
          (click)="selectRating('up')"
          aria-label="Thumbs up — this was helpful"
        >
          <svg class="h-3.5 w-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3H14z"/>
            <path stroke-linecap="round" stroke-linejoin="round" d="M7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"/>
          </svg>
          Yes
        </button>

        <button
          type="button"
          class="flex items-center gap-1.5 rounded-lg border px-2.5 py-1.5 text-xs font-medium transition focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-cyan-400/70"
          [class]="rating() === 'down' ? 'border-red-300 bg-red-50 text-red-700 dark:border-red-400/30 dark:bg-red-400/10 dark:text-red-300' : 'border-slate-200 bg-white/60 text-slate-500 hover:border-red-300 hover:text-red-600 dark:border-white/10 dark:bg-white/[0.04] dark:text-slate-400'"
          (click)="selectRating('down')"
          aria-label="Thumbs down — this needs improvement"
        >
          <svg class="h-3.5 w-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M10 15v4a3 3 0 0 0 3 3l4-9V2H5.72a2 2 0 0 0-2 1.7l-1.38 9a2 2 0 0 0 2 2.3H10z"/>
            <path stroke-linecap="round" stroke-linejoin="round" d="M17 2h2.67A2.31 2.31 0 0 1 22 4v7a2.31 2.31 0 0 1-2.33 2H17"/>
          </svg>
          Needs work
        </button>
      </div>
    </div>

    @if (rating() === 'down') {
      <div class="mt-3">
        <label for="feedback-comment" class="mb-1 block text-xs font-semibold text-slate-600 dark:text-slate-400">
          What should we improve?
        </label>
        <textarea
          id="feedback-comment"
          rows="2"
          placeholder="Tell us what fell short…"
          [value]="comment()"
          (input)="onCommentChange($any($event.target).value)"
          class="w-full resize-none rounded-xl border border-slate-200 bg-white/80 px-3 py-2 text-sm text-slate-800 outline-none placeholder:text-slate-400 transition focus:border-cyan-400 focus:ring-2 focus:ring-cyan-400/25 dark:border-white/10 dark:bg-white/[0.05] dark:text-slate-200 dark:placeholder:text-slate-600"
        ></textarea>
        <button
          type="button"
          class="mt-2 rounded-lg bg-slate-800 px-4 py-1.5 text-xs font-semibold text-white transition hover:bg-slate-700 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-cyan-400/70 dark:bg-white/10 dark:hover:bg-white/15"
          (click)="submit()"
        >
          Submit feedback
        </button>
      </div>
    }
  }

</div>
