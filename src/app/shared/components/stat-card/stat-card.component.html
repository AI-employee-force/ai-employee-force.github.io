<article
	class="group rounded-2xl border border-slate-200/80 bg-white/70 p-5 shadow-sm backdrop-blur-md transition-all duration-300 motion-safe:hover:-translate-y-1 motion-safe:hover:border-cyan-400/35 motion-safe:hover:shadow-[0_12px_40px_-20px_rgba(34,211,238,0.18)] dark:border-white/10 dark:bg-slate-900/60 dark:motion-safe:hover:border-cyan-400/35 dark:motion-safe:hover:shadow-[0_14px_44px_-18px_rgba(124,58,237,0.2)]"
>
	<p
		class="mb-1 bg-gradient-to-br from-slate-900 to-cyan-500 bg-clip-text text-2xl font-extrabold tracking-tight text-transparent dark:from-white dark:to-cyan-400"
	>
		{{ stat().value }}
	</p>
	<p class="m-0 font-semibold text-slate-800 dark:text-slate-100">{{ stat().label }}</p>
	@if (stat().hint; as h) {
		<p class="mt-1.5 text-xs text-slate-500 dark:text-slate-400">{{ h }}</p>
	}
</article>
