<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<title>AI Employee Force — Enterprise AI workforce &amp; agent marketplace</title>
		<base href="/" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta
			name="description"
			content="Discover, deploy, and orchestrate role-based AI employees across engineering, product, operations, and more. Enterprise-ready governance for AI-native organizations."
		/>
		<meta name="theme-color" content="#faf8ff" />
		<meta name="robots" content="index, follow" />
		<meta property="og:locale" content="en_US" />
		<meta name="format-detection" content="telephone=no" />
		<script type="application/ld+json">
			{
				"@context": "https://schema.org",
				"@graph": [
					{
						"@type": "WebSite",
						"name": "AI Employee Force",
						"description": "Discover, deploy, and orchestrate role-based AI employees across engineering, product, operations, and more.",
						"inLanguage": "en-US"
					},
					{
						"@type": "Organization",
						"name": "AI Employee Force",
						"description": "Enterprise AI workforce orchestration and agent marketplace."
					}
				]
			}
		</script>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap"
			rel="stylesheet"
		/>
		<link rel="icon" type="image/svg+xml" href="favicon.svg" />
		<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
		<link rel="shortcut icon" href="favicon.ico" />
		<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
		<script>
			(function () {
				try {
					var k = 'aef-theme';
					var t = localStorage.getItem(k);
					var dark = t === 'dark';
					document.documentElement.classList.toggle('dark', dark);
					document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
				} catch (e) {}
			})();
		</script>
	</head>
	<body>
		<app-root></app-root>
	</body>
</html>
