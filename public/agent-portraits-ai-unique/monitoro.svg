    <stop offset="100%" stop-color="#4E1188"/>
  </linearGradient>
  <linearGradient id="visor_monitoro" x1="82" y1="64" x2="174" y2="142" gradientUnits="userSpaceOnUse">
    <stop offset="0%" stop-color="#4E1188"/>
    <stop offset="52%" stop-color="#6425EF"/>
    <stop offset="100%" stop-color="#E740F7"/>
  </linearGradient>
  <linearGradient id="glass_monitoro" x1="76" y1="58" x2="180" y2="146" gradientUnits="userSpaceOnUse">
    <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.75"/>
    <stop offset="55%" stop-color="#FFFFFF" stop-opacity="0.22"/>
    <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.02"/>
  </linearGradient>
  <radialGradient id="halo_monitoro" cx="50%" cy="35%" r="68%">
