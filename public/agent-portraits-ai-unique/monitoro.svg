    <stop offset="46%" stop-color="#6425EF" stop-opacity="0.14"/>
    <stop offset="100%" stop-color="#EDF452" stop-opacity="0"/>
  </radialGradient>
  <filter id="shadow_monitoro" x="-50%" y="-50%" width="200%" height="200%">
    <feDropShadow dx="0" dy="18" stdDeviation="13" flood-color="#4E1188" flood-opacity="0.25"/>
    <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#F63150" flood-opacity="0.22"/>
  </filter>
  <filter id="glow_monitoro" x="-80%" y="-80%" width="260%" height="260%">
    <feGaussianBlur stdDeviation="4" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <style>
    .avatar { animation: float 4.4s ease-in-out infinite; transform-origin: 128px 132px; }
    .ring { animation: orbit 8s linear infinite; transform-origin: 128px 128px; }
    .prop { animation: prop 3.6s ease-in-out infinite; transform-origin: 194px 124px; }
    .scan { animation: scan 2.8s ease-in-out infinite; }
    @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
    @keyframes orbit { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes prop { 0%,100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-5px) rotate(2deg); } }
    @keyframes scan { 0%,100% { opacity:.16; transform: translateY(-8px); } 50% { opacity:.62; transform: translateY(10px); } }
  </style>
</defs>

