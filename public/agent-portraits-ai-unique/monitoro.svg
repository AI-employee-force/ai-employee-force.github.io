<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Monitoro unique modern AI bot">
<defs>
  <linearGradient id="card_monitoro" x1="0" y1="0" x2="256" y2="256" gradientUnits="userSpaceOnUse">
    <stop offset="0%" stop-color="#FBC7E2"/>
    <stop offset="54%" stop-color="#FFFFFF"/>
    <stop offset="100%" stop-color="#F9CEBE"/>
  </linearGradient>
  <linearGradient id="accent_monitoro" x1="44" y1="34" x2="214" y2="222" gradientUnits="userSpaceOnUse">
    <stop offset="0%" stop-color="#F63150"/>
    <stop offset="45%" stop-color="#6425EF"/>
    <stop offset="100%" stop-color="#EDF452"/>
  </linearGradient>
  <linearGradient id="shell_monitoro" x1="68" y1="42" x2="188" y2="214" gradientUnits="userSpaceOnUse">
