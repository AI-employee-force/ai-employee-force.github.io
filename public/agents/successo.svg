    <filter id="shadow-successo" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect x="32" y="32" width="448" height="448" rx="88" fill="#081120"/>
  <rect x="40" y="40" width="432" height="432" rx="80" fill="url(#bg-successo)" opacity="0.9"/>
  <circle cx="380" cy="128" r="72" fill="url(#orb-successo)"/>
  <circle cx="154" cy="372" r="96" fill="url(#orb-successo)" opacity="0.7"/>

  <g filter="url(#shadow-successo)">
    <rect x="96" y="84" width="320" height="344" rx="48" fill="#0A1528" fill-opacity="0.84" stroke="rgba(255,255,255,0.16)"/>
    <rect x="116" y="104" width="280" height="304" rx="38" fill="#0E1C34" fill-opacity="0.96"/>
  </g>

  <g transform="translate(136 120) scale(2)">
    
        <circle cx="60" cy="48" r="22" stroke="#dbeafe" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <path d="M48 48l8 8 16-16" stroke="#dbeafe" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <path d="M40 92c8-8 15-12 20-12s12 4 20 12" stroke="#dbeafe" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        
