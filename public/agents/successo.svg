      <stop stop-color="#f472b6"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="orb-successo" x1="120" y1="120" x2="392" y2="392" gradientUnits="userSpaceOnUse">
