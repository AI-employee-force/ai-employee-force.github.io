<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Flowo uniquely colored AI studio bot">
<defs>
  <linearGradient id="card_flowo" x1="18" y1="16" x2="238" y2="240" gradientUnits="userSpaceOnUse">
    <stop offset="0%" stop-color="#D4F9DB"/>
    <stop offset="52%" stop-color="#FFFFFF"/>
    <stop offset="100%" stop-color="#EED7F8"/>
  </linearGradient>
  <radialGradient id="aura_flowo" cx="50%" cy="38%" r="64%">
