  </filter>
  <filter id="glow_flowo" x="-80%" y="-80%" width="260%" height="260%">
    <feGaussianBlur stdDeviation="4" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <style>
    .bot { animation: float 4.5s ease-in-out infinite; transform-origin: 128px 132px; }
    .orbit { animation: orbit 10s linear infinite; transform-origin: 128px 129px; }
    .prop { animation: prop 3.9s ease-in-out infinite; transform-origin: 194px 126px; }
    .shine { animation: shine 3.2s ease-in-out infinite; }
    @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-7px); } }
    @keyframes orbit { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes prop { 0%,100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-4px) rotate(2deg); } }
    @keyframes shine { 0%,100% { opacity:.2; transform: translateX(-8px); } 50% { opacity:.52; transform: translateX(8px); } }
  </style>
</defs>
