<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="TechProducto animated robot">
<defs>
  <linearGradient id="accent_techproducto" x1="68" y1="40" x2="196" y2="206" gradientUnits="userSpaceOnUse">
    <stop offset="0%" stop-color="#fb7185"/>
    <stop offset="100%" stop-color="#a78bfa"/>
  </linearGradient>
  <radialGradient id="bg_techproducto" cx="50%" cy="30%" r="70%">
    <stop offset="0%" stop-color="#13213B"/>
    <stop offset="100%" stop-color="#09111F"/>
  </radialGradient>
  <filter id="shadow_techproducto" x="-40%" y="-40%" width="180%" height="180%">
    <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.22"/>
  </filter>
  <style>
    .bot {
      animation: float 4.30s ease-in-out infinite;
      transform-origin: 128px 128px;
    }
    .prop {
      animation: propFloat 3.10s ease-in-out infinite;
      transform-origin: 184px 120px;
    }
    .blink {
      animation: blink 3.00s infinite;
      transform-origin: 128px 108px;
    }
    .glowPulse {
      animation: pulse 2.6s ease-in-out infinite;
    }
    @keyframes float {
      0%,100% { transform: translateY(0px); }
      50% { transform: translateY(-5px); }
    }
    @keyframes propFloat {
      0%,100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-3px) rotate(1.3deg); }
    }
    @keyframes blink {
      0%, 45%, 100% { transform: scaleY(1); }
      47%, 49% { transform: scaleY(0.15); }
    }
    @keyframes pulse {
      0%,100% { opacity: .9; }
      50% { opacity: .45; }
    }
  </style>
</defs>

<circle cx="54" cy="54" r="22" fill="url(#accent_techproducto)" opacity="0.14" class="glowPulse"/>
