<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Designo animated robot">
<defs>
  <linearGradient id="accent_designo" x1="68" y1="40" x2="196" y2="206" gradientUnits="userSpaceOnUse">
    <stop offset="0%" stop-color="#f472b6"/>
    <stop offset="100%" stop-color="#a78bfa"/>
  </linearGradient>
  <radialGradient id="bg_designo" cx="50%" cy="30%" r="70%">
    <stop offset="0%" stop-color="#13213B"/>
    <stop offset="100%" stop-color="#09111F"/>
  </radialGradient>
  <filter id="shadow_designo" x="-40%" y="-40%" width="180%" height="180%">
    <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.22"/>
  </filter>
  <style>
    .bot {
      animation: float 4.30s ease-in-out infinite;
      transform-origin: 128px 128px;
    }
    .prop {
      animation: propFloat 3.40s ease-in-out infinite;
      transform-origin: 184px 120px;
    }
    .blink {
      animation: blink 4.05s infinite;
      transform-origin: 128px 108px;
    }
    .glowPulse {
      animation: pulse 2.6s ease-in-out infinite;
    }
    @keyframes float {
      0%,100% { transform: translateY(0px); }
      50% { transform: translateY(-5px); }
    }
    @keyframes propFloat {
      0%,100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-3px) rotate(1.3deg); }
    }
    @keyframes blink {
      0%, 45%, 100% { transform: scaleY(1); }
      47%, 49% { transform: scaleY(0.15); }
    }
    @keyframes pulse {
      0%,100% { opacity: .9; }
      50% { opacity: .45; }
    }
  </style>
</defs>

<circle cx="54" cy="54" r="22" fill="url(#accent_designo)" opacity="0.14" class="glowPulse"/>
<circle cx="206" cy="192" r="28" fill="url(#accent_designo)" opacity="0.10" class="glowPulse"/>
<ellipse cx="128" cy="214" rx="58" ry="10" fill="#6366f1" opacity="0.14"/>

<g class="bot" filter="url(#shadow_designo)">
  <path d="M88 64l20-20 10 28z" fill="#FFF6FB" stroke="#D8B4FE" stroke-width="4"/><path d="M168 44l20 20-30 8z" fill="#FFF6FB" stroke="#D8B4FE" stroke-width="4"/>
  <rect x="78" y="48" width="100" height="96" rx="34" fill="#F8FBFF" stroke="#9CCBFF" stroke-width="4"/>
  <path d="M84 93c0-17 14-31 31-31h26c17 0 31 14 31 31v18c0 17-14 31-31 31h-26c-17 0-31-14-31-31V93z" fill="url(#bg_designo)" stroke="#1D4ED8" stroke-width="3"/>
  <g class="blink">
    <ellipse cx="108" cy="108" rx="10" ry="10" fill="#59E8FF"/><ellipse cx="148" cy="108" rx="10" ry="10" fill="#59E8FF"/><circle cx="105" cy="104" r="3.2" fill="#E8FFFF"/><circle cx="145" cy="104" r="3.2" fill="#E8FFFF"/>
  </g>
  <path d="M112 126c9 6 23 6 32 0" stroke="#63E9FF" stroke-width="3" stroke-linecap="round" fill="none"/>
  <path d="M128 48V34" stroke="url(#accent_designo)" stroke-width="4" stroke-linecap="round"/>
  <circle cx="128" cy="28" r="5" fill="url(#accent_designo)" class="glowPulse"/>

  <path d='M106 150h44l12 28h-68z' fill='#FFF6FB' stroke='#D8B4FE' stroke-width='4'/>
  <rect x="108" y="184" width="16" height="26" rx="8" fill="#F8FBFF" stroke="#A8C8FF" stroke-width="4"/>
  <rect x="132" y="184" width="16" height="26" rx="8" fill="#F8FBFF" stroke="#A8C8FF" stroke-width="4"/>
  <rect x="86" y="154" width="18" height="44" rx="9" fill="#F8FBFF" stroke="#A8C8FF" stroke-width="4"/>
  <rect x="152" y="154" width="18" height="44" rx="9" fill="#F8FBFF" stroke="#A8C8FF" stroke-width="4"/>
</g>

<g class="prop">
  <path d="M178 103c12-7 28 1 28 14 0 8-5 12-10 12h-8c-2 0-3-1-3-3 0-3 3-4 3-7 0-3-2-5-5-5-4 0-5 4-9 4-4 0-8-3-8-8 0-3 1-5 2-7z" stroke="url(#accent_designo)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/><path d="M161 135l12-12" stroke="url(#accent_designo)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</g>

